name: Test Discord notification (one-shot)

# 一時的なスモークテスト用 workflow。
# update.yml の Notify Discord ステップと同等の処理を、モック JSON を /tmp に書いてから実行する。
# 動作確認後は workflow ファイルごと削除する想定。

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare mock diff JSON
        run: |
          cat > /tmp/new_products.json <<'JSON'
          [
            {
              "category": "パイプたばこ",
              "manufacturer": "TEST BRAND",
              "name": "Smoke Test Flavor A",
              "variant": "箱",
              "grams": "50.0g",
              "priceYen": 1500,
              "country": "テスト国",
              "updatedDate": "2026-05-23",
              "source": "test",
              "sourceUrl": "https://example.com/test.pdf"
            },
            {
              "category": "パイプたばこ",
              "manufacturer": "TEST BRAND",
              "name": "Smoke Test Flavor B",
              "variant": "箱",
              "grams": "100.0g",
              "priceYen": 3000,
              "country": "テスト国",
              "updatedDate": "2026-05-23",
              "source": "test",
              "sourceUrl": "https://example.com/test.pdf"
            }
          ]
          JSON

          cat > /tmp/new_manufacturers.json <<'JSON'
          {
            "TEST BRAND": {
              "manufacturer": "TEST BRAND",
              "type": "shisha",
              "confidence": "high",
              "reason": "Smoke test notification."
            }
          }
          JSON

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set"
            exit 1
          fi

          export NEW_PROD_COUNT=$(jq 'length' /tmp/new_products.json)
          export NEW_MFR_COUNT=$(jq 'keys | length' /tmp/new_manufacturers.json)
          export PROD_SAMPLE=$(jq '.[0:5]' /tmp/new_products.json)
          export MFR_SAMPLE=$(jq 'to_entries | .[0:5] | from_entries' /tmp/new_manufacturers.json)

          DESC=$(envsubst '$NEW_PROD_COUNT $NEW_MFR_COUNT $PROD_SAMPLE $MFR_SAMPLE' \
            < .github/templates/discord-update.txt)
          DESC=$(printf '%s' "$DESC" | head -c 4000)

          jq -nc \
            --arg desc "$DESC" \
            --arg url "$PR_URL" \
            '{embeds: [{
              title: "[TEST] 認可たばこDB 更新",
              url: $url,
              description: $desc,
              color: 15844367
            }]}' > /tmp/discord_payload.json

          curl -sS -H "Content-Type: application/json" \
            -X POST -d @/tmp/discord_payload.json "$DISCORD_WEBHOOK_URL"
