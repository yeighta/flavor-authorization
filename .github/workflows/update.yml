name: Update tobacco DB

on:
  schedule:
    # Hourly on the 17th minute (avoid the top-of-hour stampede on free runners).
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: update-db
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          # We commit back data/* so we need full history for non-fast-forward pushes.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Refresh PDF URL list
        run: go run ./cmd/collect-urls -out data/pdf-urls.json

      - name: Scrape new PDFs (incremental, skips already-cached)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Limit per-run to keep within the free-tier RPM and to bound runtime.
          # Bootstrap (when cache is mostly empty) needs --limit 0 manually.
          go run ./cmd/scraper -limit 60 -rps 0.2

      - name: Classify newly-seen manufacturers
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: go run ./cmd/classify

      # main 直接 push を ruleset で禁止しているため、データブランチ → PR → 即時マージで反映する。
      - name: Commit, open PR, and merge
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          BRANCH="data-update/${TS}"
          git checkout -b "$BRANCH"
          git commit -m "data: scheduled refresh (${TS})"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --base ${{ github.ref_name }} \
            --head "$BRANCH" \
            --title "data: scheduled refresh (${TS})" \
            --body "Automated tobacco DB refresh.")
          gh pr merge "$PR_URL" --merge --delete-branch
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN によるマージ commit は他ワークフローを連鎖発火させないため、
      # データ更新があった場合のみ deploy.yml を明示的に dispatch する。
      - name: Trigger frontend deploy
        if: steps.pr.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref ${{ github.ref_name }}
