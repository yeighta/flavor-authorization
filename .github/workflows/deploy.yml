name: Deploy frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'data/products.json'
      - 'data/manufacturers.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build static site
        working-directory: frontend
        run: pnpm build

      # Cloudflare Pages deploy via Wrangler.
      # Requires repo secrets:
      #   CLOUDFLARE_API_TOKEN  — token scoped to "Cloudflare Pages: Edit"
      #   CLOUDFLARE_ACCOUNT_ID — the dashboard account id
      # And a Pages project named below.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/out --project-name=flavor-authorization --branch=main
